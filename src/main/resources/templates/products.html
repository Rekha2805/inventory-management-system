<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f2ff;
font-family:'Segoe UI';
}

.box{
max-width:1100px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

thead{
background:#efeaff;
}

.btn-purple{
background:#8a6cff;
color:white;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2 class="mb-3">Products</h2>

<div sec:authorize="hasRole('ADMIN')" class="mb-3">

<a th:href="@{/products/add}" class="btn btn-purple me-2">Add Product</a>

<a th:href="@{/reports/export}" class="btn btn-info">Download CSV</a>

</div>

<table class="table table-hover">

<thead>

<tr>
<th>Name</th>
<th>Category</th>
<th>Quantity</th>
<th>Price</th>
<th sec:authorize="hasRole('ADMIN')">Stock</th>
</tr>

</thead>

<tbody>

<tr th:each="p : ${products}">

<td th:text="${p.name}"></td>

<td th:text="${p.category}"></td>

<td th:text="${p.quantity}"></td>

<td th:text="${#numbers.formatDecimal(p.price,1,2)}"></td>

<td sec:authorize="hasRole('ADMIN')">

<a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='ADD')}"
class="btn btn-sm btn-success">+1</a>

<a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='REMOVE')}"
class="btn btn-sm btn-danger">-1</a>

</td>

</tr>

</tbody>

</table>

<a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>

</body>

</html>
