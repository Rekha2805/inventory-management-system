<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4">Inventory Dashboard</h2>

    <div class="row">

        <!-- Total Products -->
        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Total Products</h5>
                <h3 th:text="${totalProducts}"></h3>
            </div>
        </div>

        <!-- Total Inventory Value -->
        <div class="col-md-4">
            <div class="card p-3 shadow-sm bg-light">
                <h5>Total Inventory Value</h5>
                <h3>₹ <span th:text="${totalInventoryValue}"></span></h3>
            </div>
        </div>

        <!-- Low Stock Count -->
        <div class="col-md-4">
            <div class="card p-3 shadow-sm bg-warning">
                <h5>Low Stock Products</h5>
                <h3 th:text="${lowStockCount}"></h3>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a href="/products" class="btn btn-primary me-2">Products</a>
        <a href="/low-stock" class="btn btn-warning me-2">Low Stock</a>
        <a href="/logs" class="btn btn-info me-2">Stock Logs</a>
        <a href="/reports/export" class="btn btn-success me-2">Export CSV</a>
        <a href="/reports/logs/export" class="btn btn-secondary me-2">Export Logs CSV</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

</div>

</body>
</html>
