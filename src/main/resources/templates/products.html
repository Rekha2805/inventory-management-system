<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-3">Products</h2>

    <!-- ADMIN ONLY BUTTONS -->
    <div sec:authorize="hasRole('ADMIN')" class="mb-3">

        <a th:href="@{/products/add}" class="btn btn-success me-2">
            Add Product
        </a>

        <a th:href="@{/reports/export}" class="btn btn-info">
            Download CSV Report
        </a>

    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
            <th sec:authorize="hasRole('ADMIN')">Stock Update</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.quantity}"></td>

            <!-- Price formatting -->
            <td th:text="${#numbers.formatDecimal(p.price,1,2)}"></td>

            <!-- ADMIN ONLY STOCK UPDATE -->
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='ADD')}"
                   class="btn btn-sm btn-primary me-1">+1</a>

                <a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='REMOVE')}"
                   class="btn btn-sm btn-danger">-1</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
