<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
background:#f7f5ff;
font-family:'Segoe UI';
margin:0;
}

.sidebar{
width:240px;
height:100vh;
background:linear-gradient(180deg,#7c5cff,#5a3ff2);
position:fixed;
color:white;
padding-top:30px;
}

.sidebar h3{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
padding:14px 25px;
text-decoration:none;
margin:5px 10px;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
padding-left:30px;
}

.main{
margin-left:240px;
padding:40px;
}

.dashboard-card{
background:white;
border-radius:16px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.dashboard-card:hover{
transform:translateY(-6px);
}

.badge{
background:red;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Inventory</h3>

<a href="/dashboard">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="/products">
<i class="bi bi-box"></i> Products
</a>

<a href="/low-stock">
<i class="bi bi-exclamation-triangle"></i> Low Stock
</a>

<a href="/logs">
<i class="bi bi-clock-history"></i> Logs
</a>

<a href="/reports/export">
<i class="bi bi-download"></i> Reports
</a>

<a href="/logout">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

<div class="main">

<h2 class="mb-4">Dashboard</h2>

<div class="row g-4">

<div class="col-md-4">

<div class="dashboard-card">

<h6>Total Products</h6>

<h2 th:text="${totalProducts}"></h2>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h6>Total Inventory Value</h6>

<h2>₹ <span th:text="${totalInventoryValue}"></span></h2>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h6>Low Stock</h6>

<h2 th:text="${lowStockCount}"></h2>

</div>

</div>

</div>

</div>

</body>

</html>
