<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Logs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f7f5ff;
font-family:'Segoe UI';
}

.box{
max-width:900px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

thead{
background:#ede9ff;
}

</style>

</head>

<body>

<div class="box">

<h3>Stock Logs</h3>

<table class="table">

<thead>

<tr>
<th>Product ID</th>
<th>Type</th>
<th>Quantity</th>
<th>Date</th>
</tr>

</thead>

<tbody>

<tr th:each="log : ${logs}">

<td th:text="${log.productId}"></td>

<td th:text="${log.changeType}"></td>

<td th:text="${log.quantityChanged}"></td>

<td th:text="${log.changeDate}"></td>

</tr>

</tbody>

</table>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>

</html>
